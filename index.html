<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memory Drive</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Indie+Flower&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-pink: #fff0f3;
            --glass: rgba(255, 255, 255, 0.8);
            --folder-color: #ffb3c6;
            --delete-red: #ff5e5e;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #f3e5f5 100%);
            background-attachment: fixed;
            margin: 0; padding: 0;
            display: flex; justify-content: center; min-height: 100vh;
        }

        #gatekeeper {
            align-self: center; text-align: center; background: white; padding: 2.5rem; border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.1); border: 6px double var(--primary-pink);
            max-width: 350px; width: 90%;
        }

        input[type="password"] {
            padding: 12px; border-radius: 10px; border: 2px solid var(--primary-pink);
            width: 80%; margin-bottom: 1.5rem; text-align: center; outline: none; font-size: 1rem;
        }

        #dashboard { 
            display: none; width: 100%; max-width: 1200px; margin: 0 auto; 
            padding: 20px; box-sizing: border-box; opacity: 0; transition: 0.5s; 
        }

        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }

        .logout-btn {
            background: #fff; color: #888; border: 1px solid #ddd;
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;
        }

        .main-nav {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 15px; margin-bottom: 40px;
        }

        .nav-item {
            background: var(--glass); padding: 15px; border-radius: 15px;
            text-align: center; cursor: pointer; border: 2px solid white; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-weight: 600;
        }

        .nav-item.active { background: var(--primary-pink); color: white; border-color: var(--primary-pink); }

        .sub-folder-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px; margin-top: 20px; padding: 20px;
            background: rgba(255,255,255,0.3); border-radius: 20px;
        }

        .sub-folder {
            background: white; padding: 15px; border-radius: 12px;
            text-align: center; cursor: pointer; border-bottom: 4px solid var(--folder-color);
            transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
        }

        .delete-btn {
            position: absolute; top: 5px; right: 5px;
            background: var(--delete-red); color: white; border: none;
            border-radius: 50%; width: 22px; height: 22px; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0.6; transition: 0.3s; z-index: 10;
        }

        .upload-controls {
            text-align: center; margin-bottom: 40px; background: white;
            padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .btn {
            background: white; color: var(--primary-pink); border: 2px solid var(--primary-pink);
            padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; 
            font-family: 'Quicksand', sans-serif; margin: 5px; transition: 0.3s;
        }

        .btn:hover { background: var(--primary-pink); color: white; }

        textarea {
            width: 100%; max-width: 600px; height: 70px; padding: 12px; border-radius: 12px; 
            border: 1px solid #ddd; margin-bottom: 10px; outline: none; font-family: inherit; font-size: 1rem;
        }

        .photo-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; justify-items: center; margin-top: 30px;
        }

        .polaroid {
            background: white; padding: 12px 12px 18px 12px; width: 100%; max-width: 300px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08); border-radius: 2px; position: relative;
            transition: transform 0.3s ease;
        }
        .polaroid:hover { transform: scale(1.02); }

        .polaroid img, .polaroid video { 
            width: 100%; max-height: 350px; object-fit: contain; background: #f9f9f9; border-radius: 2px; 
        }

        .caption { font-family: 'Indie Flower', cursive; text-align: center; margin-top: 15px; font-size: 1.2rem; cursor: pointer; }

        .note {
            background: white; padding: 25px; width: 100%; max-width: 320px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); border-radius: 15px;
            border-left: 5px solid var(--primary-pink); color: #444; line-height: 1.5;
            position: relative; cursor: pointer; font-size: 1.1rem;
        }

        h2 { font-family: 'Dancing Script', cursive; color: var(--primary-pink); text-align: center; font-size: 2.5rem; }
        h3 { color: var(--primary-pink); text-align: center; font-size: 1.4rem; margin-top: 0; text-transform: capitalize; }
        .hidden { display: none !important; }

        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center;
            flex-direction: column;
        }
        #lightbox-content { max-width: 90%; max-height: 80%; border: 5px solid white; border-radius: 5px; box-shadow: 0 0 30px rgba(0,0,0,0.5); background: #000; }
        #lightbox-caption { color: white; margin-top: 20px; font-family: 'Indie Flower', cursive; font-size: 1.8rem; text-align: center; }
        .close-lightbox { position: absolute; top: 20px; right: 30px; color: white; font-size: 3rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <h2 style="margin-top:0">For My Love</h2>
        <input type="password" id="passInput" placeholder="Enter Password">
        <button onclick="checkPassword()" class="btn" style="background:var(--primary-pink); color:white; width:100%">Open Memory Drive</button>
    </div>

    <div id="dashboard">
        <div class="header-bar">
            <div style="width:70px"></div>
            <h2 style="margin:0">Our Memory Drive</h2>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        
        <div class="main-nav">
            <div class="nav-item active" onclick="changeSection('birthday', this)">🎂 Birthday</div>
            <div class="nav-item" onclick="changeSection('monthsary', this)">💖 Monthsary</div>
            <div class="nav-item" onclick="changeSection('everyday', this)">☀️ Everyday</div>
            <div class="nav-item" onclick="changeSection('schedules', this)">📅 Schedules</div>
            <div class="nav-item" onclick="changeSection('roblox', this)">🎮 Roblox</div>
        </div>

        <div class="upload-controls">
            <h3 id="currentLocationText">Birthday</h3>
            <textarea id="messageInput" placeholder="Write a message..."></textarea><br>
            <button class="btn" onclick="postMessage()">📝 Post Text</button>
            <label class="btn">
                <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none;" onchange="handleUpload(this)">
                ✨ Upload Photo/Video
            </label>
            <button class="btn" onclick="createNewSubFolder()" style="border-style: dashed;">📁 + New Folder</button>
        </div>

        <button id="backBtn" class="btn hidden" onclick="exitSubFolder()" style="margin-bottom:20px;">← Back</button>

        <div id="subFolderArea" class="sub-folder-grid"></div>
        <div id="contentArea" class="photo-container"></div>
    </div>

    <div id="lightbox">
        <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
        <div id="lightbox-media-container" style="display:contents;"></div>
        <div id="lightbox-caption"></div>
    </div>

    <script>
        let currentSection = 'birthday';
        let currentSubFolder = null;
        let db;

        // --- DATABASE SETUP (IndexedDB for Large Videos) ---
        const request = indexedDB.open("MemoryDriveDB", 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("memories", { keyPath: "id" });
            db.createObjectStore("folders", { keyPath: "id" });
        };
        request.onsuccess = e => { db = e.target.result; if(localStorage.getItem('isLoggedIn') === 'true') showDashboard(); };

        function checkPassword() {
            if (document.getElementById('passInput').value === "022797") {
                localStorage.setItem('isLoggedIn', 'true');
                showDashboard();
            } else { alert("Try again, love!"); }
        }

        function logout() { localStorage.removeItem('isLoggedIn'); location.reload(); }

        function showDashboard() {
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            setTimeout(() => document.getElementById('dashboard').style.opacity = '1', 50);
            render();
        }

        function changeSection(section, el) {
            currentSection = section; currentSubFolder = null;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active'); render();
        }

        function openLightbox(src, caption, type) {
            const lb = document.getElementById('lightbox');
            const container = document.getElementById('lightbox-media-container');
            container.innerHTML = type === 'video' 
                ? `<video id="lightbox-content" src="${src}" controls autoplay></video>`
                : `<img id="lightbox-content" src="${src}">`;
            document.getElementById('lightbox-caption').innerText = caption || "";
            lb.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.getElementById('lightbox-media-container').innerHTML = '';
        }

        async function render() {
            const locationText = document.getElementById('currentLocationText');
            const subFolderArea = document.getElementById('subFolderArea');
            const contentArea = document.getElementById('contentArea');
            const backBtn = document.getElementById('backBtn');
            subFolderArea.innerHTML = ''; contentArea.innerHTML = '';

            const folders = await getAllFromStore("folders");
            const memories = await getAllFromStore("memories");

            if (currentSubFolder) {
                const f = folders.find(f => f.id === currentSubFolder);
                locationText.innerText = currentSection + " > " + (f ? f.name : '');
                subFolderArea.classList.add('hidden'); backBtn.classList.remove('hidden');
            } else {
                locationText.innerText = currentSection;
                subFolderArea.classList.remove('hidden'); backBtn.classList.add('hidden');
                folders.filter(f => f.parentSection === currentSection).forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'sub-folder';
                    div.innerHTML = `<button class="delete-btn" onclick="deleteFolder('${f.id}', event)">×</button>
                                     <div style="font-size:1.5rem">📁</div>
                                     <div style="font-size:0.8rem; font-weight:600">${f.name}</div>`;
                    div.onclick = () => { currentSubFolder = f.id; render(); };
                    subFolderArea.appendChild(div);
                });
            }

            const filtered = memories.filter(m => m.section === currentSection && m.subFolder === currentSubFolder);
            filtered.reverse().forEach(data => {
                const item = document.createElement('div');
                if (data.type === 'photo' || data.type === 'video') {
                    item.className = 'polaroid';
                    let mediaHtml = data.type === 'photo' 
                        ? `<img src="${data.src}" onclick="openLightbox('${data.src}', '${data.caption || ""}', 'photo')">`
                        : `<video src="${data.src}" onclick="openLightbox('${data.src}', '${data.caption || ""}', 'video')" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>`;
                    item.innerHTML = `<button class="delete-btn" onclick="deleteItem(${data.id})">×</button>${mediaHtml}
                        <div class="caption" onclick="editItem(${data.id})">${data.caption || "Click to add caption"}</div>`;
                } else {
                    item.className = 'note';
                    item.innerHTML = `<button class="delete-btn" onclick="deleteItem(${data.id})">×</button><div onclick="editItem(${data.id})">${data.content}</div>`;
                }
                contentArea.appendChild(item);
            });
        }

        function postMessage() {
            const val = document.getElementById('messageInput').value;
            if (!val) return;
            saveToStore("memories", { id: Date.now(), type: 'note', content: val, section: currentSection, subFolder: currentSubFolder });
            document.getElementById('messageInput').value = "";
        }

        function handleUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const type = file.type.startsWith('video') ? 'video' : 'photo';
                const reader = new FileReader();
                reader.onload = (e) => {
                    const cap = prompt("Caption:");
                    saveToStore("memories", { id: Date.now(), type: type, src: e.target.result, caption: cap || "", section: currentSection, subFolder: currentSubFolder });
                };
                reader.readAsDataURL(file);
            }
        }

        function createNewSubFolder() {
            const name = prompt("Folder Name:");
            if (!name) return;
            saveToStore("folders", { id: "f_" + Date.now(), name: name, parentSection: currentSection });
        }

        // --- DB HELPERS ---
        function saveToStore(storeName, data) {
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).add(data);
            tx.oncomplete = () => render();
        }

        function getAllFromStore(storeName) {
            return new Promise(resolve => {
                const tx = db.transaction(storeName, "readonly");
                const request = tx.objectStore(storeName).getAll();
                request.onsuccess = () => resolve(request.result);
            });
        }

        function deleteItem(id) {
            if(confirm("Delete this post?")) {
                const tx = db.transaction("memories", "readwrite");
                tx.objectStore("memories").delete(id);
                tx.oncomplete = () => render();
            }
        }

        async function deleteFolder(id, event) {
            event.stopPropagation();
            if(confirm("Delete this folder and its contents?")) {
                const txF = db.transaction("folders", "readwrite");
                txF.objectStore("folders").delete(id);
                const memories = await getAllFromStore("memories");
                const txM = db.transaction("memories", "readwrite");
                const mStore = txM.objectStore("memories");
                memories.filter(m => m.subFolder === id).forEach(m => mStore.delete(m.id));
                txM.oncomplete = () => render();
            }
        }

        async function editItem(id) {
            const tx = db.transaction("memories", "readwrite");
            const store = tx.objectStore("memories");
            const request = store.get(id);
            request.onsuccess = () => {
                const data = request.result;
                const newVal = prompt("Edit:", data.type === 'note' ? data.content : data.caption);
                if (newVal !== null) {
                    if (data.type === 'note') data.content = newVal; else data.caption = newVal;
                    store.put(data);
                    tx.oncomplete = () => render();
                }
            };
        }

        function exitSubFolder() { currentSubFolder = null; render(); }
    </script>
</body>
</html>
