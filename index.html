<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memory Drive</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Indie+Flower&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff85a2;
            --folder-bg: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Segoe UI', 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #f3e5f5 100%);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        body.unlocked { display: block; padding: 20px 10px; }

        /* --- LOGIN BOX --- */
        #gatekeeper {
            text-align: center; background: white; padding: 2.5rem; border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.2); border: 6px double var(--primary-pink);
            max-width: 320px; width: 85%; z-index: 9999;
        }

        input[type="password"] {
            padding: 12px; border-radius: 10px; border: 2px solid var(--primary-pink);
            width: 80%; margin-bottom: 1.5rem; text-align: center;
        }

        /* --- DASHBOARD --- */
        #dashboard { display: none; max-width: 800px; margin: 0 auto; opacity: 0; transition: 1s; }

        .folder-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px; margin-bottom: 30px;
        }

        .folder {
            background: var(--folder-bg); padding: 15px 5px; border-radius: 15px;
            text-align: center; cursor: pointer; border: 2px solid white; transition: 0.3s;
        }

        .folder.active { background: var(--primary-pink); color: white; border-color: var(--primary-pink); }
        .folder-icon { font-size: 1.8rem; }
        .folder-name { font-size: 0.75rem; font-weight: 600; }

        /* --- UPLOAD SECTION --- */
        .upload-controls {
            text-align: center; margin-bottom: 30px; background: rgba(255,255,255,0.4);
            padding: 15px; border-radius: 15px; border: 1px dashed var(--primary-pink);
        }

        .btn {
            background: white; color: var(--primary-pink); border: 2px solid var(--primary-pink);
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; 
            font-family: 'Quicksand', sans-serif; margin: 5px;
        }

        #messageInput {
            width: 90%; height: 50px; padding: 10px; border-radius: 10px; 
            border: 1px solid var(--primary-pink); margin-bottom: 10px;
            font-family: 'Indie Flower', cursive;
        }

        /* --- ALBUMS --- */
        .album-view { display: none; }
        .album-view.active { display: block; animation: fadeIn 0.5s; }
        .photo-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }

        .polaroid {
            background: white; padding: 15px 15px 15px 15px; width: 85%; max-width: 350px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 1px solid #eee;
        }

        .polaroid img { width: 100%; display: block; }
        .caption, .note { font-family: 'Indie Flower', cursive; cursor: pointer; }
        .caption { text-align: center; margin-top: 15px; font-size: 1.2rem; }

        .note {
            background: #fff9c4; padding: 20px; width: 85%; max-width: 350px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05); border-left: 5px solid #fbc02d;
            font-size: 1.3rem; margin-bottom: 10px; text-align: left;
        }

        h2 { font-family: 'Dancing Script', cursive; color: var(--primary-pink); text-align: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <h2 style="margin-top:0">For My Love</h2>
        <input type="password" id="passInput" placeholder="MMDDYY">
        <button onclick="checkPassword()" class="btn" style="background:var(--primary-pink); color:white; width:100%">Open Letter</button>
    </div>

    <div id="dashboard">
        <h2>Our Drive</h2>
        
        <div class="folder-grid" id="folderGrid">
            <div class="folder active" onclick="openAlbum('birthday', this)"><div class="folder-icon">🎂</div><div class="folder-name">Birthday</div></div>
            <div class="folder" onclick="openAlbum('monthsary', this)"><div class="folder-icon">💖</div><div class="folder-name">Monthsary</div></div>
            <div class="folder" onclick="openAlbum('everyday', this)"><div class="folder-icon">☀️</div><div class="folder-name">Everyday</div></div>
            <div class="folder" onclick="openAlbum('schedules', this)"><div class="folder-icon">📅</div><div class="folder-name">Schedules</div></div>
            <div class="folder" onclick="openAlbum('roblox', this)"><div class="folder-icon">🎮</div><div class="folder-name">Roblox</div></div>
        </div>

        <div class="upload-controls">
            <button class="btn" onclick="addNewFolder()">📁 + Folder</button>
            <textarea id="messageInput" placeholder="Type a message or schedule here..."></textarea><br>
            <button class="btn" onclick="postMessage()">📝 Post Text</button>
            <label class="btn">
                <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="handleUpload(this)">
                ✨ Upload Photo
            </label>
        </div>

        <div id="albumContainers">
            <div id="birthday" class="album-view active"><div class="photo-container" id="container-birthday"></div></div>
            <div id="monthsary" class="album-view"><div class="photo-container" id="container-monthsary"></div></div>
            <div id="everyday" class="album-view"><div class="photo-container" id="container-everyday"></div></div>
            <div id="schedules" class="album-view"><div class="photo-container" id="container-schedules"></div></div>
            <div id="roblox" class="album-view"><div class="photo-container" id="container-roblox"></div></div>
        </div>

        <button onclick="clearAll()" style="display:block; margin: 40px auto; background:none; border:none; color: #999; font-size:0.7rem; cursor:pointer;">Reset Memory Drive</button>
    </div>

    <script>
        let currentFolder = 'birthday';

        window.onload = function() {
            if (localStorage.getItem('isLoggedIn') === 'true') showDashboard();
            loadCustomFolders();
            loadMemories();
        };

        function checkPassword() {
            if (document.getElementById('passInput').value === "022797") {
                localStorage.setItem('isLoggedIn', 'true');
                showDashboard();
            } else { alert("Try again, love!"); }
        }

        function showDashboard() {
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            setTimeout(() => document.getElementById('dashboard').style.opacity = '1', 50);
        }

        function openAlbum(id, btn) {
            currentFolder = id;
            document.querySelectorAll('.folder').forEach(f => f.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.album-view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function addNewFolder() {
            const name = prompt("Folder Name:");
            if (!name) return;
            const id = name.toLowerCase().replace(/\s/g, '');
            
            // Save folder info
            let folders = JSON.parse(localStorage.getItem('custom_folders') || '[]');
            folders.push({id, name});
            localStorage.setItem('custom_folders', JSON.stringify(folders));
            location.reload();
        }

        function loadCustomFolders() {
            let folders = JSON.parse(localStorage.getItem('custom_folders') || '[]');
            folders.forEach(f => {
                const grid = document.getElementById('folderGrid');
                const cont = document.getElementById('albumContainers');
                grid.innerHTML += `<div class="folder" onclick="openAlbum('${f.id}', this)"><div class="folder-icon">📁</div><div class="folder-name">${f.name}</div></div>`;
                cont.innerHTML += `<div id="${f.id}" class="album-view"><div class="photo-container" id="container-${f.id}"></div></div>`;
            });
        }

        function postMessage() {
            const val = document.getElementById('messageInput').value;
            if (!val) return;
            saveAndDisplay({ id: Date.now(), type: 'note', content: val, folder: currentFolder });
            document.getElementById('messageInput').value = "";
        }

        function handleUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const cap = prompt("Caption:");
                    saveAndDisplay({ id: Date.now(), type: 'photo', src: e.target.result, caption: cap || "", folder: currentFolder });
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveAndDisplay(data) {
            let memories = JSON.parse(localStorage.getItem('our_activity') || '[]');
            memories.push(data);
            localStorage.setItem('our_activity', JSON.stringify(memories));
            displayItem(data);
        }

        function displayItem(data) {
            const container = document.getElementById('container-' + data.folder);
            if (!container) return;
            const item = document.createElement('div');
            if (data.type === 'photo') {
                item.className = 'polaroid';
                item.innerHTML = `<img src="${data.src}"><div class="caption" onclick="editItem(${data.id})">${data.caption || "..." }</div>`;
            } else {
                item.className = 'note';
                item.innerHTML = `<span onclick="editItem(${data.id})">${data.content}</span>`;
            }
            container.prepend(item);
        }

        function editItem(id) {
            let memories = JSON.parse(localStorage.getItem('our_activity') || '[]');
            const idx = memories.findIndex(m => m.id === id);
            const newVal = prompt("Edit content:", memories[idx].type === 'photo' ? memories[idx].caption : memories[idx].content);
            if (newVal !== null) {
                if (memories[idx].type === 'photo') memories[idx].caption = newVal;
                else memories[idx].content = newVal;
                localStorage.setItem('our_activity', JSON.stringify(memories));
                location.reload();
            }
        }

        function loadMemories() {
            let memories = JSON.parse(localStorage.getItem('our_activity') || '[]');
            memories.forEach(m => displayItem(m));
        }

        function clearAll() {
            if(confirm("This will delete ALL folders and photos. Continue?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
